<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tug'ilgan kun muborak!</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --pink: #FF6B9D;
    --purple: #9B59B6;
    --dark: #1a0a2e;
    --candle-colors: #FF6B6B, #FFD93D, #6BCB77, #4D96FF, #FF6B9D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Stars background */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(1); }
    to { opacity: 1; transform: scale(1.3); }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confettiFall linear infinite;
    z-index: 1;
    border-radius: 2px;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    max-width: 500px;
    width: 100%;
  }

  .greeting {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 8px;
    animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .name {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    color: white;
    text-shadow: 0 0 40px rgba(255,107,157,0.8);
    margin-bottom: 6px;
    animation: popIn 0.8s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .age-text {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: #ccc;
    margin-bottom: 30px;
    animation: fadeUp 0.8s 0.4s both;
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes fadeUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* CAKE */
  .cake-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 30px;
    animation: fadeUp 0.8s 0.5s both;
  }

  .cake {
    width: 200px;
    height: 130px;
    background: linear-gradient(135deg, #FF6B9D, #FF8E53);
    border-radius: 12px 12px 20px 20px;
    position: relative;
    box-shadow: 0 10px 40px rgba(255, 107, 157, 0.4), inset 0 -5px 15px rgba(0,0,0,0.2);
    margin: 0 auto;
  }

  .cake::before {
    content: '';
    position: absolute;
    top: -18px;
    left: -5px;
    right: -5px;
    height: 35px;
    background: linear-gradient(135deg, #FFD93D, #FF6B6B);
    border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    box-shadow: 0 -5px 15px rgba(255, 217, 61, 0.4);
  }

  .cake-stripe {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 35px;
    background: rgba(255,255,255,0.15);
    border-radius: 0 0 20px 20px;
  }

  .cake-dots {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
  }

  /* CANDLES */
  .candles-row {
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .candle {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .flame-wrap {
    position: relative;
    width: 14px;
    height: 24px;
    margin-bottom: 2px;
  }

  .flame {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 20px;
    background: radial-gradient(ellipse at 50% 80%, #FFD700 0%, #FF6B00 50%, transparent 100%);
    border-radius: 50% 50% 20% 20%;
    animation: flicker 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 10px 3px rgba(255, 165, 0, 0.6);
    transform-origin: bottom center;
    transition: all 0.5s ease;
  }

  .flame.blown {
    animation: blowOut 0.3s forwards;
  }

  @keyframes flicker {
    0% { transform: translateX(-50%) scaleX(1) scaleY(1) rotate(-2deg); }
    100% { transform: translateX(-50%) scaleX(0.85) scaleY(1.1) rotate(2deg); }
  }

  @keyframes blowOut {
    0% { opacity: 1; transform: translateX(-50%) scaleY(1); }
    50% { opacity: 0.5; transform: translateX(-50%) scaleY(1.5) scaleX(0.3); }
    100% { opacity: 0; transform: translateX(-50%) scaleY(0); }
  }

  .smoke {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 20px;
    background: linear-gradient(to top, rgba(200,200,200,0.5), transparent);
    border-radius: 2px;
    opacity: 0;
    animation: none;
  }

  .smoke.active {
    animation: smokeRise 1s ease-out forwards;
  }

  @keyframes smokeRise {
    0% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
    100% { opacity: 0; transform: translateX(calc(-50% + 5px)) scaleX(3) translateY(-20px); }
  }

  .candle-body {
    width: 14px;
    height: 36px;
    border-radius: 3px 3px 4px 4px;
    position: relative;
    overflow: hidden;
  }

  .candle-body::after {
    content: '';
    position: absolute;
    top: 0; left: 3px;
    width: 3px;
    height: 100%;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }

  .candle-base {
    width: 18px;
    height: 5px;
    border-radius: 2px;
    opacity: 0.8;
  }

  /* Microphone section */
  .mic-section {
    margin-top: 10px;
    animation: fadeUp 0.8s 1s both;
  }

  .mic-btn {
    background: linear-gradient(135deg, #9B59B6, #6C3483);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 50px;
    font-size: 1.1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(155, 89, 182, 0.4);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 auto;
  }

  .mic-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(155, 89, 182, 0.6);
  }

  .mic-btn:active {
    transform: scale(0.96);
  }

  .mic-icon { font-size: 1.4rem; }

  .mic-status {
    margin-top: 12px;
    font-size: 0.95rem;
    color: #aaa;
    min-height: 24px;
    transition: all 0.3s;
  }

  .mic-status.listening {
    color: #6BCB77;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* All blown celebration */
  .celebration {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .celebration.show {
    opacity: 1;
  }

  .celebrate-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 8vw, 4rem);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
    text-align: center;
    animation: celebratePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding: 20px;
    background: rgba(26, 10, 46, 0.85);
    border-radius: 20px;
    backdrop-filter: blur(10px);
  }

  @keyframes celebratePop {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* Volume meter */
  .volume-bar-wrap {
    width: 200px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin: 10px auto 0;
    overflow: hidden;
    display: none;
  }

  .volume-bar-wrap.active { display: block; }

  .volume-bar {
    height: 100%;
    background: linear-gradient(to right, #6BCB77, #FFD700, #FF6B6B);
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s;
  }

  /* Emoji rain */
  .emoji-rain {
    position: fixed;
    top: -50px;
    font-size: 2rem;
    animation: emojiRain linear forwards;
    pointer-events: none;
    z-index: 200;
  }

  @keyframes emojiRain {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="confettiContainer"></div>

<div class="container">
  <div class="greeting" id="greetingText">🎉 Muborak bo'lsin!</div>
  <div class="name" id="nameDisplay"></div>
  <div class="age-text" id="ageDisplay"></div>

  <div class="cake-wrapper">
    <div class="candles-row" id="candlesRow"></div>
    <div class="cake">
      <div class="cake-stripe"></div>
      <div class="cake-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="mic-section">
    <button class="mic-btn" id="micBtn" onclick="startMic()">
      <span class="mic-icon">🎤</span>
      <span id="micBtnText">Mikrofonni yoqish</span>
    </button>
    <div class="mic-status" id="micStatus">Shamlarni o'chirish uchun mikrofonni yoqing 🎂</div>
    <div class="volume-bar-wrap" id="volBarWrap">
      <div class="volume-bar" id="volBar"></div>
    </div>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celebrate-text" id="celebrateText">🎊 Tabriklaymiz! 🎊</div>
</div>

<script>
  // Get URL params
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name') || 'Do\'stim';
  const age = parseInt(params.get('age')) || 1;
  const lang = params.get('lang') || 'uz';

  // Texts
  const texts = {
    uz: {
      greeting: '🎉 Muborak bo\'lsin!',
      age: `${age} yoshga to\'ldi!`,
      micBtn: 'Mikrofonni yoqish',
      micListening: '🎤 Fuflang! Shamlarni o\'chiring...',
      micStatus: 'Shamlarni o\'chirish uchun mikrofonni yoqing 🎂',
      celebrate: `🎊 Barakalla! Hammasi o\'chdi! 🎊`,
      micError: 'Mikrofon ruxsati berilmadi 😔'
    },
    ru: {
      greeting: '🎉 Поздравляем!',
      age: `Исполнилось ${age} лет!`,
      micBtn: 'Включить микрофон',
      micListening: '🎤 Дуйте! Задуйте свечи...',
      micStatus: 'Включите микрофон чтобы задуть свечи 🎂',
      celebrate: `🎊 Молодец! Все свечи погашены! 🎊`,
      micError: 'Нет доступа к микрофону 😔'
    }
  };

  const t = texts[lang] || texts.uz;

  // Apply texts
  document.getElementById('greetingText').textContent = t.greeting;
  document.getElementById('nameDisplay').textContent = name;
  document.getElementById('ageDisplay').textContent = t.age;
  document.getElementById('micBtnText').textContent = t.micBtn;
  document.getElementById('micStatus').textContent = t.micStatus;

  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
    `;
    starsEl.appendChild(s);
  }

  // Generate confetti
  const colors = ['#FFD700','#FF6B9D','#6BCB77','#4D96FF','#FF6B6B','#FFD93D'];
  const confettiContainer = document.getElementById('confettiContainer');
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      animation-duration:${3+Math.random()*4}s;
      animation-delay:${Math.random()*3}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    confettiContainer.appendChild(c);
  }

  // Generate candles
  const candleColors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6B9D','#FF8E53','#C084FC'];
  const numCandles = Math.min(age, 12);
  const candlesRow = document.getElementById('candlesRow');
  let blownCount = 0;
  const candles = [];

  for (let i = 0; i < numCandles; i++) {
    const color = candleColors[i % candleColors.length];
    const div = document.createElement('div');
    div.className = 'candle';
    div.innerHTML = `
      <div class="flame-wrap">
        <div class="flame" id="flame${i}"></div>
        <div class="smoke" id="smoke${i}"></div>
      </div>
      <div class="candle-body" style="background:linear-gradient(135deg,${color},${color}99)"></div>
      <div class="candle-base" style="background:${color}"></div>
    `;
    candlesRow.appendChild(div);
    candles.push({ blown: false, index: i });
  }

  // Adjust candles row position for many candles
  if (numCandles > 8) {
    candlesRow.style.flexWrap = 'wrap';
    candlesRow.style.width = '220px';
    candlesRow.style.justifyContent = 'center';
    candlesRow.style.top = '-80px';
  }

  function blowCandle(index) {
    if (candles[index].blown) return;
    candles[index].blown = true;
    blownCount++;

    const flame = document.getElementById(`flame${index}`);
    const smoke = document.getElementById(`smoke${index}`);
    flame.classList.add('blown');
    setTimeout(() => {
      flame.style.display = 'none';
      smoke.classList.add('active');
    }, 300);

    if (blownCount >= numCandles) {
      setTimeout(showCelebration, 600);
    }
  }

  function showCelebration() {
    document.getElementById('celebration').classList.add('show');
    document.getElementById('celebrateText').textContent = t.celebrate;
    // Emoji rain
    const emojis = ['🎊','🎉','🎈','⭐','🌟','✨','🎂','🎁'];
    for (let i = 0; i < 20; i++) {
      setTimeout(() => {
        const e = document.createElement('div');
        e.className = 'emoji-rain';
        e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        e.style.left = Math.random()*100 + 'vw';
        e.style.animationDuration = (2+Math.random()*2) + 's';
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 4000);
      }, i * 150);
    }
  }

  // Microphone
  let audioCtx, analyser, isListening = false;

  async function startMic() {
    if (isListening) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);

      isListening = true;
      document.getElementById('micBtn').style.background = 'linear-gradient(135deg, #6BCB77, #27ae60)';
      document.getElementById('micBtnText').textContent = lang === 'uz' ? 'Tinglanmoqda...' : 'Слушаю...';
      document.getElementById('micStatus').textContent = t.micListening;
      document.getElementById('micStatus').className = 'mic-status listening';
      document.getElementById('volBarWrap').classList.add('active');

      detectBlow();
    } catch (e) {
      document.getElementById('micStatus').textContent = t.micError;
    }
  }

  function detectBlow() {
    const dataArray = new Uint8Array(analyser.fftSize);
    let blowFrames = 0;

    function check() {
      if (blownCount >= numCandles) return;
      analyser.getByteTimeDomainData(dataArray);

      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) {
        sum += Math.abs(dataArray[i] - 128);
      }
      const avg = sum / dataArray.length;
      const volume = Math.min(avg / 20, 1);

      document.getElementById('volBar').style.width = (volume * 100) + '%';

      if (volume > 0.3) {
        blowFrames++;
        if (blowFrames > 3) {
          // Blow candles one by one
          for (let i = 0; i < candles.length; i++) {
            if (!candles[i].blown) {
              blowCandle(i);
              break;
            }
          }
          blowFrames = 0;
        }
      } else {
        blowFrames = Math.max(0, blowFrames - 1);
      }

      if (blownCount < numCandles) requestAnimationFrame(check);
    }
    check();
  }
</script>
</body>
</html>
